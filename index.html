<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.40">
<title>Battle of the Buffalo Fundraiser</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f1ea;
    margin: 0;
    padding: 30px;
    position: relative;
    overflow-x: hidden;
}

#confettiCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
}

/* GOAL REACHED BANNER */
#goalBanner {
    position: fixed;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(90deg,#b71c1c,#ffcc00,#b71c1c);
    color: white;
    font-size: 40px;
    font-weight: bold;
    padding: 20px 60px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 10;
    transition: top 0.8s cubic-bezier(.17,.67,.32,1.34);
}

#goalBanner.show {
    top: 40px;
}

.splatter {
    position: fixed;
    background: radial-gradient(circle at 30% 30%, #ff7043, #b71c1c 60%, #7f0000);
    z-index: 0;
    pointer-events: none;
}

.top-date {
    position: absolute;
    top: 20px;
    right: 30px;
    font-weight: bold;
    color: #444;
    z-index: 2;
}

h1 { text-align: center; position: relative; z-index: 2; }

.info-bar {
    text-align: center;
    margin-bottom: 30px;
    font-size: 16px;
    position: relative;
    z-index: 2;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
}

.bottle-wrapper {
    position: relative;
    width: 260px;
    height: 560px;
}

.neck {
    width: 80px;
    height: 90px;
    border: 6px solid #111;
    border-bottom: none;
    border-radius: 40px 40px 0 0;
    margin: 0 auto;
    background: #fff;
}

.bottle {
    position: relative;
    width: 240px;
    height: 470px;
    border: 6px solid #111;
    border-radius: 90px 90px 60px 60px;
    overflow: hidden;
    background: #fff;
    margin: 0 auto;
    box-shadow: inset 0 0 25px rgba(0,0,0,0.15);
}

.sauce {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #a31212, #ff6a00);
    transition: height 0.8s ease;
}

.tick {
    position: absolute;
    right: -25px;
    width: 20px;
    height: 2px;
    background: #333;
}

.tick-label {
    position: absolute;
    right: -70px;
    font-size: 12px;
    color: #333;
}

.label {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    width: 190px;
    background: white;
    border-radius: 12px;
    border: 4px solid #111;
    text-align: center;
    padding: 10px;
}

.label img {
    width: 100%;
    height: auto;
}

.controls {
    text-align: center;
    margin-top: 30px;
    position: relative;
    z-index: 2;
}

input {
    padding: 10px;
    font-size: 16px;
    width: 150px;
    margin: 5px;
}

button {
    padding: 10px 16px;
    font-size: 16px;
    cursor: pointer;
    margin: 5px;
}

.total {
    text-align: center;
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
    position: relative;
    z-index: 2;
}

.passcode-section {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
}

</style>
</head>

<h1>Battle of the Buffalo</h1>

<div class="info-bar">
Goal: $45,000 by March 18<br>
Countdown: <span id="countdown"></span>
</div>

<input type="password" id="passcode" placeholder="Enter Passcode">

</div>

        <div id="ticks"></div>
    </div>
</div>

<div class="controls">
    <input type="number" id="amount" placeholder="Enter amount">
    <button onclick="addMoney()">Add</button>
    <button onclick="resetTotal()">Reset</button>
</div>

<div class="total">
Total Raised: $<span id="total">0</span>
</div>

<script>
const goal = 45000;
const splatterStep = 500;
const correctPasscode = "BigD";
let unlocked = false;
let total = parseFloat(localStorage.getItem("buffaloTotal")) || 0;
let confettiTriggered = false;
let bannerShown = false;

const sauce = document.getElementById("sauce");
const totalDisplay = document.getElementById("total");
const bottleHeight = 470;

function createTicks() {
    const tickContainer = document.getElementById("ticks");
    for (let i = 0; i <= 5; i++) {
        const tick = document.createElement("div");
        tick.className = "tick";
        tick.style.bottom = (i * (bottleHeight / 5)) + "px";

        const label = document.createElement("div");
        label.className = "tick-label";
        label.style.bottom = (i * (bottleHeight / 5) - 6) + "px";
        label.innerText = "$" + (goal / 5 * i).toLocaleString();

        tickContainer.appendChild(tick);
        tickContainer.appendChild(label);
    }
}

function unlock() {
    const input = document.getElementById("passcode").value;
    if (input === correctPasscode) {
        unlocked = true;
        document.getElementById("lockStatus").textContent = "Unlocked";
        document.getElementById("lockStatus").style.color = "green";
    } else {
        alert("Incorrect passcode");
    }
}

function generateSplatterShape(size) {
    const splat = document.createElement("div");
    splat.className = "splatter";
    splat.style.width = size + "px";
    splat.style.height = size + "px";
    splat.style.top = Math.random() * 100 + "%";
    splat.style.left = Math.random() * 100 + "%";
    splat.style.borderRadius = `${40 + Math.random()*40}% ${40 + Math.random()*40}% ${40 + Math.random()*40}% ${40 + Math.random()*40}% / ${40 + Math.random()*40}% ${40 + Math.random()*40}% ${40 + Math.random()*40}% ${40 + Math.random()*40}%`;
    document.body.appendChild(splat);
}

function generateSplatters() {
    document.querySelectorAll('.splatter').forEach(s => s.remove());
    if (total <= goal) return;
    const excess = total - goal;
    const splatterCount = Math.floor(excess / splatterStep);
    for (let i = 0; i < splatterCount; i++) {
        const size = Math.random() * 180 + 60;
        generateSplatterShape(size);
    }
}

function triggerConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const pieces = [];
    for (let i = 0; i < 150; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 8 + 4,
            speed: Math.random() * 3 + 2,
            color: ['#ff0000','#ffcc00','#000000'][Math.floor(Math.random()*3)]
        });
    }

    function update() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pieces.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x,p.y,p.size,p.size);
            p.y += p.speed;
            if (p.y > canvas.height) p.y = -10;
        });
        requestAnimationFrame(update);
    }
    update();
}

function showGoalBanner() {
    const banner = document.getElementById("goalBanner");
    banner.classList.add("show");
    setTimeout(() => {
        banner.classList.remove("show");
    }, 5000);
}

function updateMeter() {
    totalDisplay.textContent = total.toLocaleString();
    let percentage = (total / goal) * 100;
    sauce.style.height = Math.min(percentage, 100) + "%";

    if (total >= goal && !confettiTriggered) {
        triggerConfetti();
        confettiTriggered = true;
    }

    if (total >= goal && !bannerShown) {
        showGoalBanner();
        bannerShown = true;
    }

    generateSplatters();
    localStorage.setItem("buffaloTotal", total);
}

function addMoney() {
    if (!unlocked) { alert("Enter passcode first."); return; }
    const amount = parseFloat(document.getElementById("amount").value);
    if (!isNaN(amount) && amount > 0) {
        total += amount;
        updateMeter();
        document.getElementById("amount").value = "";
    }
}

function resetTotal() {
    if (!unlocked) { alert("Enter passcode first."); return; }
    total = 0;
    confettiTriggered = false;
    bannerShown = false;
    localStorage.removeItem("buffaloTotal");
    document.querySelectorAll('.splatter').forEach(s => s.remove());
    updateMeter();
}

function updateDate() {
    const today = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById("currentDate").textContent = today.toLocaleDateString(undefined, options);
}

function updateCountdown() {
    const now = new Date();
    let year = now.getFullYear();
    let target = new Date(year, 2, 18);
    if (now > target) target = new Date(year + 1, 2, 18);
    const diff = target - now;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);
    document.getElementById("countdown").textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

createTicks();
updateMeter();
updateDate();
updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
